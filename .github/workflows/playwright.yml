# .github/workflows/playwright.yml
name: Playwright Tests
on: [push, pull_request]

jobs:
  playwright-tests:
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run Playwright tests
        # Use the --shard flag with matrix values
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-reports-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  merge-reports:
    # This job runs after all shards complete
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-reports-*
          merge-multiple: true

      - name: Merge reports into HTML and Excel
        run: npx playwright merge-reports --reporter html --reporter ./excel-reporter.js ./all-blob-reports

      - name: Upload final HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      - name: Upload final Excel report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-excel-report
          path: playwright-test-results.xlsx
          retention-days: 30